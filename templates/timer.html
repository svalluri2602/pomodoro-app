{% extends "base.html" %}

{% block content %}

<h1>{{project.name}} - Pomdoro Timer</h1>

<div id="timer-display">25:00</div>


<form id="start-form" method="post" action="{% url 'start-session' project.pk %}">
    {% csrf_token %}
    <button type ="submit" id = "start-btn">Start</button>

</form>

{% if session %}
<form id="stop-form" method="post" action="{% url 'stop-session' session.pk %}">
    {% csrf_token %}
    <button type="submit" id="stop-btn">Stop</button>
</form>
{% else %}
<div id="stop-form-placeholder"></div>
{% endif %}

{% endblock %}
